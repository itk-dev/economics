framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        failure_transport: failed

        transports:
            sync: "sync://"
            # @see https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: "%env(MESSENGER_TRANSPORT_DSN)%"
            # @see https://symfony.com/doc/current/messenger.html#saving-retrying-failed-messages
            failed:
                dsn: "%env(MESSENGER_TRANSPORT_DSN_FAILED)%"

        routing:
            # Route your messages to the transports
            'App\Message\UpsertProjectMessage': async
            'App\Message\UpsertVersionMessage': async
            'App\Message\UpsertIssueMessage': async
            'App\Message\UpsertWorklogMessage': async
            'App\Message\LeantimeUpdateMessage': async
            'App\Message\LeantimeDeleteMessage': async
